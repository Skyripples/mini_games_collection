<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Game Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>迷你遊戲集</h1>

    <div id="menu-screen" class="screen active">
      <h2>選擇遊戲</h2>
      <div class="menu-buttons">
        <button id="btn-1a2b">1A2B</button>
        <button id="btn-snake">貪食蛇</button>
        <button id="btn-minesweeper">踩地雷</button>
      </div>
    </div>

    <div id="game-screen" class="screen">
      <div class="top-bar">
        <button id="btn-back">回到主選單</button>
      </div>

      <div id="game-1a2b" class="game-panel hidden">
        <h2>1A2B</h2>
        <p>請輸入 4 個不重複的數字來猜答案。</p>

        <div class="input-row">
          <input id="guess-input" type="text" maxlength="4" placeholder="例如 1234" />
          <button id="btn-guess">猜測</button>
          <button id="btn-restart-1a2b">重新開始</button>
        </div>

        <p id="message">遊戲開始！</p>
        <p>猜測次數：<span id="guess-count">0</span></p>

        <div class="history">
          <h3>歷史紀錄</h3>
          <ul id="history-list"></ul>
        </div>
      </div>

      <div id="game-snake" class="game-panel hidden">
        <h2>貪食蛇</h2>
        <div class="input-row">
          <button id="btn-start-snake">開始 / 重新開始</button>
        </div>
        <p>分數：<span id="snake-score">0</span></p>
        <p id="snake-message">按方向鍵控制移動，吃到食物就會變長。</p>
        <canvas id="snake-canvas" width="400" height="400"></canvas>
      </div>

      <div id="game-minesweeper" class="game-panel hidden">
        <h2>踩地雷</h2>
        <div class="input-row">
          <button id="btn-restart-minesweeper">重新開始</button>
        </div>
        <p id="minesweeper-message">左鍵翻開格子，右鍵插旗。</p>
        <div id="minesweeper-board" class="minesweeper-board"></div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
